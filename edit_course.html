{% extends 'base.html' %}
{% block content %}
<h2>Edit Course</h2>
<form method="POST" class="row g-3">
    <div class="col-md-4">
        <label class="form-label">Course Code</label>
        <input type="text" name="course_code" value="{{ course.course_code }}" class="form-control" title="Course Code" required>
    </div>
    <div class="col-md-8">
        <label class="form-label">Course Name</label>
        <input type="text" name="course_name" value="{{ course.course_name }}" class="form-control" title="Course Name" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Credits</label>
        <input type="number" name="credits" value="{{ course.credits }}" class="form-control" title="Credits" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Semester</label>
        <input type="number" name="semester" value="{{ course.semester }}" class="form-control" title="Semester" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Department</label>
        <select name="department_id" class="form-select" title="Department" required>
            {% for dept in departments %}
                <option value="{{ dept.department_id }}" 
                        {% if dept.department_id == course.department_id %}selected{% endif %}>
                    {{ dept.department_name }}
                </option>
            {% endfor %}
        </select>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary btn-lg">Update Course</button>
    </div>
</form>
{% endblock %}
