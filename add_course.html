{% extends 'base.html' %}
{% block content %}
<h2>Add New Course</h2>
<form method="POST" class="row g-3">
    <div class="col-md-4">
        <label class="form-label">Course Code</label>
        <input type="text" name="course_code" class="form-control" placeholder="Enter course code" required>
    </div>
    <div class="col-md-8">
        <label class="form-label">Course Name</label>
        <input type="text" name="course_name" class="form-control" placeholder="Enter course name" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Credits</label>
        <input type="number" name="credits" class="form-control" placeholder="Enter number of credits" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Semester</label>
        <input type="number" name="semester" class="form-control" placeholder="Enter semester" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Department</label>
        <select name="department_id" class="form-select" title="Select a department" required>
            {% for dept in departments %}
                <option value="{{ dept.department_id }}">{{ dept.department_name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary btn-lg">Add Course</button>
    </div>
</form>
{% endblock %}
