{% extends 'base.html' %}
{% block content %}
<h2>Edit Department</h2>
<form method="POST" class="row g-3">
    <div class="col-md-6">
        <label class="form-label">Department Name</label>
        <input type="text" name="department_name" value="{{ department.department_name }}" class="form-control" placeholder="Enter department name" required>
    </div>
    <div class="col-md-6">
        <label class="form-label">Head of Department (HOD)</label>
        <input type="text" name="hod_name" value="{{ department.hod_name }}" class="form-control" placeholder="Enter HOD name">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary btn-lg">Update Department</button>
    </div>
</form>
{% endblock %}
