{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2>Teacher Management</h2>
    <a href="{{ url_for('add_teacher') }}" class="btn btn-success">Add New Teacher</a>
</div>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Name</th><th>Email</th><th>Phone</th><th>Department</th><th>Designation</th><th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for t in teachers %}
        <tr>
            <td>{{ t.name }}</td>
            <td>{{ t.email }}</td>
            <td>{{ t.phone }}</td>
            <td>{{ t.department_name|default('N/A') }}</td>
            <td>{{ t.designation }}</td>
            <td>
                <a href="{{ url_for('edit_teacher', teacher_id=t.teacher_id) }}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{{ url_for('delete_teacher', teacher_id=t.teacher_id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this teacher?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
