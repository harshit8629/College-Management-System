{% extends 'base.html' %}
{% block content %}
<h2>Marks Management</h2>

<!-- Add Marks Form -->
<div class="card mb-4">
    <div class="card-header bg-primary text-white">Add Marks</div>
    <div class="card-body">
        <form method="POST" class="row g-3">
            <div class="col-md-4">
                <label for="student_id" class="form-label">Student</label>
                <select id="student_id" name="student_id" class="form-select" required>
                    <option value="">Select Student</option>
                    {% for s in students %}
                    <option value="{{ s.student_id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label for="course_id" class="form-label">Course</label>
                <select id="course_id" name="course_id" class="form-select" required>
                    <option value="">Select Course</option>
                    {% for c in courses %}
                    <option value="{{ c.course_id }}">{{ c.course_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label for="marks" class="form-label">Marks</label>
                <input id="marks" type="number" name="marks" class="form-control" placeholder="Marks (0-100)" min="0" max="100" required>
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-success">Add</button>
            </div>
        </form>
    </div>
</div>

<!-- Marks List -->
<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr><th>Student</th><th>Course</th><th>Marks</th><th>Grade</th><th>Action</th></tr>
    </thead>
    <tbody>
        {% for m in marks %}
        <tr>
            <td>{{ m.student_name }}</td>
            <td>{{ m.course_name }}</td>
            <td><strong>{{ m.marks }}</strong></td>
            <td><span class="badge bg-success">{{ m.grade }}</span></td>
            <td>
                <a href="{{ url_for('delete_marks', mark_id=m.mark_id) }}" 
                   class="btn btn-sm btn-danger" onclick="return confirm('Delete this mark?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
